# config.example.yaml — copy to config.yaml and fill in your API keys

# Define provider credentials once; LLM/image/video inherit automatically.
# Inline api_key/access_key in a section always takes precedence over providers.
providers:
  gemini:
    api_key: ""                      # your Gemini API key
    proxy: ""                        # optional HTTP proxy
  jimeng:
    access_key: ""                   # your Volcengine AK
    secret_key: ""                   # your Volcengine SK

llm:
  provider: gemini                   # inherits api_key + proxy from providers.gemini
  base_url: https://generativelanguage.googleapis.com/v1beta/openai
  model: gemini-2.5-flash

image:
  providers: [gemini, jimeng]        # ordered list (first = default); use [mock] to skip
  gemini:
    model: imagen-4.0-generate-001
  jimeng:
    req_key: jimeng_t2i_v40

video:
  providers: [gemini]                # ordered list; use [mock] to skip
  gemini:
    model: veo-3.1-lite-generate-preview

output_dir: ./output
db_path: ./shortmaker.db
strategies_path: ""                  # path to strategies.json (empty = no strategies)
